<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Engineering Stage 6 Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        
        <section id="login-view" class="view">
            <h1>Security Gate</h1>
            <p>Please enter your email to access instructional content.</p>
            <input type="email" id="email-input" placeholder="student@school.edu">
            <button onclick="validateEmail()">Login</button>
            <p id="login-error" class="error"></p>
        </section>

        <section id="dashboard-view" class="view hidden">
            <h1>Student Dashboard</h1>
            <div class="nav-menu">
                <button onclick="showView('quiz-view')">Start Quiz</button>
                <button onclick="logout()">Logout</button>
            </div>
        </section>

        <section id="quiz-view" class="view hidden">
            <div class="quiz-header">
                <button onclick="showView('dashboard-view')">Back to Dashboard</button>
                <span id="score-display">Score: 0</span>
            </div>
            
            <div id="quiz-container">
                <h2 id="question-text">Display Question from Array</h2>
                <input type="text" id="answer-input" placeholder="Type your answer here...">
                <button onclick="processAndValidate()">Submit Answer</button>
                <p id="feedback-text"></p>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
