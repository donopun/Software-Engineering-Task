<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Engineering Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div id="login-view" class="view">
            <h1>Security Gate</h1>
            <p>Please enter your student email to access the portal.</p>
            <input type="email" id="email-input" placeholder="student@school.edu">
            <p id="login-error" style="color: red; font-size: 0.8rem;"></p>
            <button class="primary-btn" onclick="validateEmail()">Login</button>
        </div>

        <div id="dashboard-view" class="view hidden">
            <h1 id="welcome-msg"></h1>
            <p>Your learning modules are ready.</p>
            <hr>
            <button class="primary-btn" onclick="showView('quiz-view')">Start Coding Quiz</button>
            <button class="secondary-btn" onclick="logout()">Logout</button>
        </div>

        <div id="quiz-view" class="view hidden">
            <div id="quiz-container">
                <div id="score-display" style="text-align: right; font-weight: bold;">Score: 0</div>
                <h3>Question:</h3>
                <p id="question-text">Loading question...</p>
                
                <input type="text" id="answer-input" placeholder="Your answer here...">
                <button class="primary-btn" onclick="processAndValidate()">Submit Answer</button>
                <p id="feedback-text"></p>
                
                <button class="secondary-btn" onclick="showView('dashboard-view')" style="margin-top: 20px;">Back to Dashboard</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
